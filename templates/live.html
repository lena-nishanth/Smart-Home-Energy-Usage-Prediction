{% extends 'base.html' %}
{% block content %}
<div class="row g-3">
  <div class="col-12">
    <div class="card">
      <div class="card-body">
        <div class="d-flex align-items-center gap-2 mb-3">
          <h5 class="mb-0"><i class="bi bi-broadcast-pin text-danger me-2"></i>Live Monitor</h5>
          <span class="badge bg-success" id="connBadge">Idle</span>
          <small class="text-muted ms-2" id="lastUpdate"></small>
          <div class="ms-auto d-flex gap-2 flex-wrap">
            <input class="form-control form-control-sm" style="width: 180px;" id="deviceId" placeholder="device (optional)" />
            <input class="form-control form-control-sm" style="width: 220px;" id="espUrl" placeholder="ESP URL (http://ip/)" />
            <div class="form-check form-switch d-flex align-items-center">
              <input class="form-check-input" type="checkbox" id="autoPull">
              <label class="form-check-label small ms-1" for="autoPull">Auto-Pull</label>
            </div>
            <span id="espStatus" class="small text-muted align-self-center">Idle</span>
            <select class="form-select form-select-sm" id="metric">
              <option value="Power" selected>Power</option>
              <option value="Voltage">Voltage</option>
              <option value="Current">Current</option>
              <option value="Energy">Energy</option>
            </select>
            <select class="form-select form-select-sm" id="interval">
              <option value="30000">30 s</option>
              <option value="60000" selected>1 min</option>
              <option value="180000">3 min</option>
              <option value="300000">5 min</option>
            </select>
          </div>
        </div>

        <div class="row row-cols-2 row-cols-md-4 g-3 mb-3">
          <div class="col"><div class="p-3 border rounded bg-white h-100"><div class="text-muted small">Voltage</div><div class="fs-4 fw-semibold" id="tileVoltage">--</div></div></div>
          <div class="col"><div class="p-3 border rounded bg-white h-100"><div class="text-muted small">Current</div><div class="fs-4 fw-semibold" id="tileCurrent">--</div></div></div>
          <div class="col"><div class="p-3 border rounded bg-white h-100"><div class="text-muted small">Power</div><div class="fs-4 fw-semibold" id="tilePower">--</div></div></div>
          <div class="col"><div class="p-3 border rounded bg-white h-100"><div class="text-muted small">Energy</div><div class="fs-4 fw-semibold" id="tileEnergy">--</div></div></div>
        </div>

        <div id="chart" style="height: 420px;"></div>
        <!-- <div class="small text-muted mt-2">POST ESP readings to <code>/api/live/ingest</code> with fields: <code>device, timestamp, voltage, current, power, energy</code>. Example GET: <code>/api/live/ingest?device=lab&power=123</code></div> -->
        <br>
      </div>
    </div>
  </div>
</div>
<script>
  const chartEl = document.getElementById('chart');
  let metricSel = document.getElementById('metric');
  let intervalSel = document.getElementById('interval');
  let deviceInp = document.getElementById('deviceId');
  let espUrlInp = document.getElementById('espUrl');
  let autoPullChk = document.getElementById('autoPull');
  let espStatus = document.getElementById('espStatus');
  let timer = null;
  let espTimer = null;

  function initPlot(){
    const layout = {margin:{l:50,r:20,t:20,b:40}, xaxis:{title:'Time'}, yaxis:{title:metricSel.value}, showlegend:false};
    Plotly.newPlot(chartEl, [{x:[], y:[], mode:'lines', name: metricSel.value}], layout, {responsive:true});
  }

  function setEspStatus(state){
    // states: 'Idle', 'Connecting...', 'OK', 'Error'
    espStatus.textContent = state;
    espStatus.classList.remove('text-success','text-danger','text-muted');
    if (state === 'OK') espStatus.classList.add('text-success');
    else if (state === 'Error') espStatus.classList.add('text-danger');
    else espStatus.classList.add('text-muted');
  }

  function setTiles(seriesMap, xs){
    function lastVal(name){
      const s = seriesMap[name];
      if (!s || !s.y || s.y.length===0) return null;
      const v = s.y[s.y.length-1];
      return Number.isFinite(v) ? v : null;
    }
    const v = lastVal('Voltage');
    const c = lastVal('Current');
    const p = lastVal('Power');
    const e = lastVal('Energy');
    document.getElementById('tileVoltage').textContent = v!==null ? `${v.toFixed(1)} V` : '--';
    document.getElementById('tileCurrent').textContent = c!==null ? `${c.toFixed(1)} mA` : '--';
    document.getElementById('tilePower').textContent   = p!==null ? `${p.toFixed(1)} W` : '--';
    document.getElementById('tileEnergy').textContent  = e!==null ? `${e.toFixed(3)} kWh` : '--';
    const t = xs && xs.length? xs[xs.length-1] : '';
    document.getElementById('lastUpdate').textContent = t? `Last update: ${t}` : '';
  }

  async function fetchLatest(){
    const device = encodeURIComponent(deviceInp.value||'default');
    const url = `/api/live/latest?device=${device}&max_samples=500`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      const seriesList = (data.series||[]);
      const seriesMap = Object.fromEntries(seriesList.map(s=>[s.name, s]));
      const sel = seriesMap[metricSel.value] || {x:[], y:[]};
      Plotly.react(chartEl, [{x: sel.x, y: sel.y, mode:'lines', name: metricSel.value}], {margin:{l:50,r:20,t:20,b:40}, xaxis:{title:'Time'}, yaxis:{title:metricSel.value}, showlegend:false});
      setTiles(seriesMap, sel.x);
      document.getElementById('connBadge').textContent = 'Updating';
    } catch(e){
      document.getElementById('connBadge').textContent = 'Error';
    }
  }

  function start(){
    clearInterval(timer);
    initPlot();
    timer = setInterval(fetchLatest, parseInt(intervalSel.value,10));
    fetchLatest();
  }

  metricSel.addEventListener('change', start);
  intervalSel.addEventListener('change', start);
  deviceInp.addEventListener('change', start);

  function toggleEspPull(){
    clearInterval(espTimer);
    if (autoPullChk.checked){
      setEspStatus('Connecting...');
      const doPull = async ()=>{
        const esp = espUrlInp.value;
        if (!esp) return;
        const device = encodeURIComponent(deviceInp.value||'default');
        const url = `/api/live/pull?esp=${encodeURIComponent(esp)}&device=${device}`;
        try {
          const res = await fetch(url);
          if (res.ok) setEspStatus('OK'); else setEspStatus('Error');
        } catch(e) { setEspStatus('Error'); }
      };
      espTimer = setInterval(doPull, parseInt(intervalSel.value,10));
      doPull();
    }
    else {
      setEspStatus('Idle');
    }
  }
  autoPullChk.addEventListener('change', toggleEspPull);
  espUrlInp.addEventListener('change', toggleEspPull);
  intervalSel.addEventListener('change', toggleEspPull);

  window.addEventListener('load', ()=>{
    if (!deviceInp.value) deviceInp.value = 'esp32';
    start();
  });
</script>
{% endblock %}
