{% extends 'base.html' %} {% block content %}
<div class="container mt-4">
  <h2>Energy Analytics</h2>

  <!-- Status Message -->
  <div id="status-message" class="alert alert-info" style="display: none"></div>

  <!-- Stats Cards -->
  <div class="row mb-4">
    <div class="col-md-3 mb-3">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title">Average (kWh)</h5>
          <h3 id="avg-value" class="text-primary">-</h3>
        </div>
      </div>
    </div>
    <div class="col-md-3 mb-3">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title">Peak Hour</h5>
          <h3 id="peak-hour" class="text-success">-</h3>
        </div>
      </div>
    </div>
    <div class="col-md-3 mb-3">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title">Anomalies</h5>
          <h3 id="anomaly-count" class="text-warning">-</h3>
        </div>
      </div>
    </div>
    <div class="col-md-3 mb-3">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title">Total Records</h5>
          <h3 id="record-count" class="text-info">-</h3>
        </div>
      </div>
    </div>
  </div>

  <!-- Charts -->
  <div class="row mb-4">
    <div class="col-12">
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">Energy Consumption Trend</h5>
        </div>
        <div class="card-body">
          <canvas id="trend-chart" height="300"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- Add these new sections after the existing trend chart -->
  <div class="row mb-4">
    <div class="col-md-6">
      <div class="card h-100">
        <div class="card-header">
          <h5 class="mb-0">Hourly Energy Pattern</h5>
        </div>
        <div class="card-body">
          <canvas id="hourly-chart" height="250"></canvas>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card h-100">
        <div class="card-header">
          <h5 class="mb-0">Energy by Day of Week</h5>
        </div>
        <div class="card-body">
          <canvas id="dayofweek-chart" height="250"></canvas>
        </div>
      </div>
    </div>
  </div>

  <div class="row mb-4">
    <div class="col-12">
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">Energy Distribution</h5>
        </div>
        <div class="card-body">
          <canvas id="distribution-chart" height="300"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  // Global chart instances
  let trendChart = null;
  let hourlyChart = null;
  let dayOfWeekChart = null;
  let distributionChart = null;

  // Function to update UI with data
  function updateUI(insights) {
    console.log("Updating UI with insights:", insights);

    // Update stats cards
    const avgEl = document.getElementById("avg-value");
    const peakHourEl = document.getElementById("peak-hour");
    const anomalyEl = document.getElementById("anomaly-count");
    const recordEl = document.getElementById("record-count");

    if (avgEl && insights.stats && insights.stats.mean !== undefined) {
      avgEl.textContent = insights.stats.mean.toFixed(2);
    } else if (avgEl) {
      avgEl.textContent = "N/A";
    }

    if (peakHourEl && insights.patterns && insights.patterns.peak_hour !== undefined) {
      peakHourEl.textContent = `${insights.patterns.peak_hour}:00`;
    } else if (peakHourEl) {
      peakHourEl.textContent = "N/A";
    }

    if (anomalyEl && insights.anomaly_count !== undefined) {
      anomalyEl.textContent = insights.anomaly_count;
    } else if (anomalyEl) {
      anomalyEl.textContent = "0";
    }

    if (recordEl && insights.stats && insights.stats.count !== undefined) {
      recordEl.textContent = insights.stats.count;
    } else if (recordEl) {
      recordEl.textContent = "0";
    }

    // Update charts if data is available
    if (insights.trend_data && insights.trend_data.labels && insights.trend_data.values) {
      updateChart(insights.trend_data);
    }
    
    if (insights.hourly_pattern) {
      updateHourlyChart(insights.hourly_pattern);
    }
    
    if (insights.day_of_week) {
      updateDayOfWeekChart(insights.day_of_week);
    }
    
    if (insights.distribution) {
      updateDistributionChart(insights.distribution);
    }
    
    // Hide any error messages if everything loaded successfully
    const statusEl = document.getElementById("status-message");
    if (statusEl) {
      statusEl.style.display = "none";
    }
  }

  // Function to update or create chart
  function updateChart(chartData) {
    const ctx = document.getElementById("trend-chart").getContext("2d");

    if (window.trendChart) {
      // Update existing chart
      window.trendChart.data.labels = chartData.labels;
      window.trendChart.data.datasets[0].data = chartData.values;
      window.trendChart.update();
    } else {
      // Create new chart
      window.trendChart = new Chart(ctx, {
        type: "line",
        data: {
          labels: chartData.labels,
          datasets: [
            {
              label: "Energy Consumption (kWh)",
              data: chartData.values,
              borderColor: "rgb(75, 192, 192)",
              tension: 0.1,
              fill: false,
            },
          ],
        },
        options: {
          responsive: true,
          scales: {
            y: {
              beginAtZero: true,
              title: {
                display: true,
                text: "Energy (kWh)",
              },
            },
            x: {
              title: {
                display: true,
                text: "Date",
              },
            },
          },
        },
      });
    }
  }


// Add these new chart update functions
function updateHourlyChart(data) {
    const ctx = document.getElementById('hourly-chart').getContext('2d');
    
    if (window.hourlyChart) {
        window.hourlyChart.destroy();
    }
    
    window.hourlyChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: data.hours.map(h => `${h}:00`),
            datasets: [{
                label: 'Avg Energy (kWh)',
                data: data.values,
                backgroundColor: 'rgba(75, 192, 192, 0.6)',
                borderColor: 'rgba(75, 192, 192, 1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: 'Energy (kWh)'
                    }
                },
                x: {
                    title: {
                        display: true,
                        text: 'Hour of Day'
                    }
                }
            }
        }
    });
}

function updateDayOfWeekChart(data) {
    const ctx = document.getElementById('dayofweek-chart').getContext('2d');
    
    if (window.dayOfWeekChart) {
        window.dayOfWeekChart.destroy();
    }
    
    window.dayOfWeekChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: data.days,
            datasets: [{
                label: 'Avg Energy (kWh)',
                data: data.values,
                backgroundColor: 'rgba(153, 102, 255, 0.6)',
                borderColor: 'rgba(153, 102, 255, 1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: 'Energy (kWh)'
                    }
                }
            }
        }
    });
}

function updateDistributionChart(data) {
    const ctx = document.getElementById('distribution-chart').getContext('2d');
    
    if (window.distributionChart) {
        window.distributionChart.destroy();
    }
    
    // Create labels for the bins
    const labels = [];
    for (let i = 0; i < data.bins.length; i++) {
        labels.push(`${data.ranges[i].toFixed(2)} - ${data.ranges[i+1].toFixed(2)}`);
    }
    
    window.distributionChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Frequency',
                data: data.bins,
                backgroundColor: 'rgba(255, 159, 64, 0.6)',
                borderColor: 'rgba(255, 159, 64, 1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: 'Frequency'
                    }
                },
                x: {
                    title: {
                        display: true,
                        text: 'Energy Range (kWh)'
                    }
                }
            }
        }
    });
}

  // Load data when page loads
  document.addEventListener("DOMContentLoaded", function () {
    // Initial data load
    loadData();

    // Set up refresh button if it exists
    const refreshBtn = document.getElementById("refresh-btn");
    if (refreshBtn) {
      refreshBtn.addEventListener("click", function () {
        loadData();
      });
    }
  });

  // Function to load data from API
  async function loadData() {
    try {
      const response = await fetch("/api/analytics/insights");
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }
      const data = await response.json();

      if (data.status === "success" && data.insights) {
        updateUI(data.insights);
      } else {
        throw new Error(data.message || "Failed to load data");
      }
    } catch (error) {
      console.error("Error loading data:", error);
      const statusEl = document.getElementById("status-message");
      if (statusEl) {
        statusEl.textContent = `Error: ${error.message}`;
        statusEl.className = "alert alert-danger";
        statusEl.style.display = "block";
      }
    }
  }
</script>
{% endblock %}
