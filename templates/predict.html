{% extends 'base.html' %}
{% block content %}
<div class="card mb-3">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h4 class="mb-0"><i class="bi bi-activity me-2 text-primary"></i>Prediction</h4>
      <div class="btn-group btn-group-sm" role="group">
        <button id="dlCsvBtn" class="btn btn-outline-secondary"><i class="bi bi-file-earmark-arrow-down me-1"></i>CSV</button>
        <button id="dlPngBtn" class="btn btn-outline-secondary"><i class="bi bi-image me-1"></i>PNG</button>
      </div>
    </div>
    <div class="row g-2">
  <div class="col-12 col-md-3">
    <label class="form-label">Model</label>
    <select id="model" class="form-select">
      {% for m in models %}
      <option value="{{ m.id }}">{{ m.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-12 col-md-3">
    <label class="form-label">Start</label>
    <input id="start" type="datetime-local" class="form-control" />
  </div>
  <div class="col-12 col-md-3">
    <label class="form-label">End</label>
    <input id="end" type="datetime-local" class="form-control" />
  </div>
  <div class="col-12 col-md-3">
    <label class="form-label">Unit Cost (per kWh)</label>
    <input id="unit_cost" type="number" step="0.0001" min="0" class="form-control" placeholder="e.g. 10.0" />
  </div>
  <div class="col-12 col-md-3 d-flex align-items-end">
    <button id="predictBtn" class="btn btn-primary w-100"><i class="bi bi-cpu me-1"></i>Predict</button>
  </div>
  <div class="col-12 col-md-3">
    <label class="form-label">Forecast Horizon (points)</label>
    <input id="horizon" type="number" min="1" class="form-control" placeholder="e.g. 60" />
  </div>
  <div class="col-12 col-md-3 d-flex align-items-end">
    <button id="forecastBtn" class="btn btn-outline-secondary w-100 me-2"><i class="bi bi-graph-up-arrow me-1"></i>Forecast</button>
  </div>
  <div class="col-12 col-md-3 d-flex align-items-end">
    <button id="clearForecastBtn" class="btn btn-outline-secondary w-100"><i class="bi bi-x-circle me-1"></i>Clear Forecast</button>
  </div>
    </div>
  </div>
</div>
<div id="bestBanner" class="alert alert-info d-none"></div>
<div id="forecastInfo" class="text-muted small mb-2"></div>
<div id="predChart" style="width:100%;height:480px;"></div>
<div id="chartCaption" class="text-muted small mt-1"></div>
<hr/>
<h6 class="mt-3">Train/Test Split View</h6>
<div id="splitChart" style="width:100%;height:360px;"></div>
<div id="splitCaption" class="text-muted small mt-1"></div>

<div class="accordion mt-3" id="predAcc">
  <div class="accordion-item">
    <h2 class="accordion-header" id="hdrMetrics">
      <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#colMetrics" aria-expanded="true" aria-controls="colMetrics">Metrics</button>
    </h2>
    <div id="colMetrics" class="accordion-collapse collapse show" aria-labelledby="hdrMetrics" data-bs-parent="#predAcc">
      <div class="accordion-body">
        <div class="table-responsive">
          <table id="metricsTable" class="table table-sm table-striped d-none">
            <thead>
              <tr>
                <th>Model</th>
                <th>R²</th>
                <th>MAE</th>
                <th>RMSE</th>
                <th>MAPE</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="row mt-3">
          <div class="col-12 col-md-6">
            <h6>Top Anomalies</h6>
            <div id="anomalies" class="small text-muted">None</div>
          </div>
          <div class="col-12 col-md-6">
            <h6>Top Features</h6>
            <div id="importances" class="small text-muted">None</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="accordion-item">
    <h2 class="accordion-header" id="hdrSummaries">
      <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#colSummaries" aria-expanded="false" aria-controls="colSummaries">Summaries</button>
    </h2>
    <div id="colSummaries" class="accordion-collapse collapse" aria-labelledby="hdrSummaries" data-bs-parent="#predAcc">
      <div class="accordion-body">
        <div class="row g-3" id="summariesRow">
          <div class="col-12 col-md-6">
            <div class="card">
              <div class="card-body">
                <h6 class="card-title">Selected Model</h6>
                <ul class="mb-0" id="summarySelected"></ul>
              </div>
            </div>
          </div>
          <div class="col-12 col-md-6">
            <div class="card">
              <div class="card-body">
                <h6 class="card-title">Best Model</h6>
                <ul class="mb-0" id="summaryBest"></ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  const MODEL_NAMES = {
    linear: 'Linear Regression',
    rf: 'Random Forest Regression',
    gboost: 'Gradient Boosting Regression',
    xgb: 'XGBoost Regression',
    catboost: 'CatBoost Regression',
    lstm: 'LSTM'
  };
  const TARGET_UNITS = {
    Energy: 'Energy (kWh)',
    Power: 'Power (kW)',
    Current: 'Current (A)',
    Voltage: 'Voltage (V)'
  };
  document.getElementById('predictBtn').addEventListener('click', async () => {
    const btn = document.getElementById('predictBtn');
    const old = btn.innerHTML; btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Predicting...';
    try {
      const body = {
        model: document.getElementById('model').value,
        target: 'Energy',
        start: document.getElementById('start').value || null,
        end: document.getElementById('end').value || null,
        unit_cost: (document.getElementById('unit_cost').value || '').trim() || null,
      };
      const res = await fetch('/api/predict', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)});
      const data = await res.json();
      if (data.error) { alert(JSON.stringify(data)); return; }
    const traces = [
      {x: data.x, y: data.y_true, type: 'scatter', mode: 'lines', name: 'Actual'},
      {x: data.x, y: data.y_pred, type: 'scatter', mode: 'lines', name: 'Predicted'}
    ];
    const targetName = 'Energy';
    const yAxisTitle = TARGET_UNITS[targetName] || targetName;
    const modelLabel = MODEL_NAMES[data.model] || data.model;
    const layout = {
      title: `${modelLabel}: Predicted vs Actual (${targetName})`,
      xaxis: { title: 'Timestamp' },
      yaxis: { title: yAxisTitle },
      legend: { title: { text: 'Series' } },
      margin: { t: 60 }
    };
    Plotly.newPlot('predChart', traces, layout);
    // Attach export handlers now that we have a chart
    attachExportHandlers(data);
    // Train vs Test chart (cumulative view with shaded test region)
    (function renderSplit(){
      const xa = data.x_all || [];
      const ya = (data.y_all || []).map(v => (typeof v === 'number' ? v : (v===null? null : Number(v))));
      const idx = Number.isInteger(data.test_start_index) ? data.test_start_index : Math.max(0, xa.length - (data.y_true||[]).length);
      const x_train = xa.slice(0, idx);
      const x_test = xa.slice(idx);

      // Build cumulative actual series (if already cumulative, keep; else cumsum)
      function cumulative(arr){
        const out = [];
        let s = 0, looksCum = true;
        for (let i=1;i<arr.length;i++){ const d = (arr[i]-arr[i-1]); if (isFinite(d)) { if (d < -1e-9) { looksCum = false; break; } } }
        if (looksCum) return arr.slice();
        for (let i=0;i<arr.length;i++){ const v = arr[i]; s += (isFinite(v)? v : 0); out.push(s); }
        return out;
      }
      const y_actual_cum = cumulative(ya);
      const y_train_cum = y_actual_cum.slice(0, idx);
      const y_test_cum = y_actual_cum.slice(idx);

      // Predicted cumulative aligned to the last train actual value
      const y_pred = (data.y_pred || []).map(Number);
      let y_pred_cum = [];
      let base = (idx>0 && isFinite(y_actual_cum[idx-1])) ? y_actual_cum[idx-1] : 0;
      let s = base;
      for (let i=0;i<y_pred.length;i++){ s += (isFinite(y_pred[i])? y_pred[i] : 0); y_pred_cum.push(s); }

      const traces2 = [];
      if (x_train.length) traces2.push({ x: x_train, y: y_train_cum, type:'scatter', mode:'lines', name:'Train (actual, cumulative)', line:{ color:'#6c757d' } });
      if (x_test.length) traces2.push({ x: x_test, y: y_test_cum, type:'scatter', mode:'lines', name:'Test (actual, cumulative)', line:{ color:'#0d6efd', width:3 } });
      if ((data.x||[]).length && y_pred_cum.length) traces2.push({ x: data.x, y: y_pred_cum, type:'scatter', mode:'lines', name:'Test (predicted, cumulative)', line:{ color:'#fd7e14', width:2 } });

      const layout2 = {
        title:'Cumulative Energy: Train vs Test (highlighted) with Predicted',
        xaxis:{ title:'Timestamp' }, yaxis:{ title: 'Cumulative Energy (kWh)' }, legend:{ title:{ text:'Series' } }, margin:{ t:60 },
        shapes: idx>0 && xa.length>idx ? [{
          type:'rect', xref:'x', yref:'paper', x0: xa[idx], x1: xa[xa.length-1], y0:0, y1:1, fillcolor:'rgba(13,110,253,0.06)', line:{width:0}
        }] : []
      };
      Plotly.newPlot('splitChart', traces2, layout2);
      document.getElementById('splitCaption').textContent = `Train samples: ${x_train.length}, Test samples: ${x_test.length}`;
    })();
    // Overlay anomaly markers
    const anoms = data.anomalies || [];
    if (anoms.length) {
      const ax = anoms.map(a => a.t);
      const ay = anoms.map(a => (typeof a.actual === 'number' ? a.actual : null));
      const atrace = { x: ax, y: ay, type: 'scatter', mode: 'markers', name: 'Anomalies', marker: { color: '#dc3545', size: 8, symbol: 'x' } };
      Plotly.addTraces('predChart', [atrace]);
    }
    const startVal = document.getElementById('start').value || 'Start: All';
    const endVal = document.getElementById('end').value || 'End: All';
    document.getElementById('chartCaption').textContent = `Predicted vs Actual Energy over time. ${startVal} | ${endVal}.`;
    const m = data.metrics || {};
    // document.getElementById('metrics').innerHTML = `
    //   <div>R2: ${m.R2?.toFixed ? m.R2.toFixed(3) : m.R2}</div>
    //   <div>MAE: ${m.MAE?.toFixed ? m.MAE.toFixed(3) : m.MAE}</div>
    //   <div>RMSE: ${m.RMSE?.toFixed ? m.RMSE.toFixed(3) : m.RMSE}</div>
    //   <div>MAPE: ${m.MAPE?.toFixed ? m.MAPE.toFixed(2) : m.MAPE}</div>`;
    // Best model banner
    const best = data.best_model;
    const bestBanner = document.getElementById('bestBanner');
    if (best) {
      bestBanner.textContent = `Best model by RMSE: ${MODEL_NAMES[best] || best}`;
      bestBanner.classList.remove('d-none');
    } else {
      bestBanner.classList.add('d-none');
    }
    // Metrics table across models
    const metricsAll = data.metrics_all || data.metricsAll; // fallback key
    const table = document.getElementById('metricsTable');
    const tbody = table.querySelector('tbody');
    if (metricsAll) {
      tbody.innerHTML = '';
      Object.entries(metricsAll).forEach(([model, mm]) => {
        const tr = document.createElement('tr');
        if (model === best) tr.classList.add('table-success');
        tr.innerHTML = `
          <td>${MODEL_NAMES[model] || model}</td>
          <td>${mm.R2?.toFixed ? mm.R2.toFixed(3) : mm.R2}</td>
          <td>${mm.MAE?.toFixed ? mm.MAE.toFixed(3) : mm.MAE}</td>
          <td>${mm.RMSE?.toFixed ? mm.RMSE.toFixed(3) : mm.RMSE}</td>
          <td>${mm.MAPE?.toFixed ? mm.MAPE.toFixed(2) : mm.MAPE}</td>`;
        tbody.appendChild(tr);
      });
      table.classList.remove('d-none');
    } else {
      table.classList.add('d-none');
    }

    // Anomalies
    (function renderAnoms(){
      const anoms = data.anomalies || [];
      const el = document.getElementById('anomalies');
      if (!anoms || !anoms.length) { el.textContent = 'None'; return; }
      const rows = anoms.map(a => `${a.t ?? ''} | residual: ${typeof a.residual==='number'?a.residual.toFixed(3):a.residual} | score: ${typeof a.score==='number'?a.score.toFixed(2):a.score}`);
      el.innerHTML = `<pre class="mb-0">${rows.join('\n')}</pre>`;
    })();

    // Feature importances / coefficients
    (function renderImps(){
      const imps = data.importances || [];
      const el = document.getElementById('importances');
      if (!imps || !imps.length) { el.textContent = 'None'; return; }
      const rows = imps.map(x => `${x.name}: ${typeof x.value==='number'?x.value.toFixed(4):x.value}`);
      el.innerHTML = `<pre class="mb-0">${rows.join('\n')}</pre>`;
    })();

    // Summaries rendering
    function fmt(n, d=2) { return (typeof n === 'number' && isFinite(n)) ? n.toFixed(d) : '—'; }
    const sel = data.summaries || {};
    const selectedId = data.model;
    const bestId = data.best_model;
    const bestSummaries = (data.summaries_all && bestId) ? data.summaries_all[bestId] : null;
    const summarySelected = document.getElementById('summarySelected');
    const summaryBest = document.getElementById('summaryBest');
    summarySelected.innerHTML = `
      <li><strong>Model</strong>: ${MODEL_NAMES[selectedId] || selectedId || '—'}</li>
      <li><strong>Total energy (kWh)</strong>: ${fmt(sel.actual_total_energy)}</li>
      <li><strong>Predicted energy (kWh)</strong>: ${fmt(sel.predicted_total_energy)}</li>
      <li><strong>Unit cost (per kWh)</strong>: ${sel.unit_cost ?? '—'}</li>
      <li><strong>Estimated cost (Actual)</strong>: ${fmt(sel.actual_estimated_cost)}</li>
      <li><strong>Estimated cost (Predicted)</strong>: ${fmt(sel.predicted_estimated_cost)}</li>`;
    if (bestSummaries) {
      summaryBest.innerHTML = `
        <li><strong>Model</strong>: ${MODEL_NAMES[bestId] || bestId}</li>
        <li><strong>Total energy (kWh)</strong>: ${fmt(bestSummaries.actual_total_energy)}</li>
        <li><strong>Predicted energy (kWh)</strong>: ${fmt(bestSummaries.predicted_total_energy)}</li>
        <li><strong>Unit cost (per kWh)</strong>: ${bestSummaries.unit_cost ?? '—'}</li>
        <li><strong>Estimated cost (Actual)</strong>: ${fmt(bestSummaries.actual_estimated_cost)}</li>
        <li><strong>Estimated cost (Predicted)</strong>: ${fmt(bestSummaries.predicted_estimated_cost)}</li>`;
    } else {
      summaryBest.innerHTML = '<li>No best-model summaries available.</li>';
    }

    // Leaderboard functionality removed
    } catch (e) {
      alert('Prediction failed. Details in console.');
      console.error('Prediction error', e);
    } finally {
      btn.disabled = false; btn.innerHTML = old;
    }
  });


  // Forecast overlay
  document.getElementById('forecastBtn').addEventListener('click', async () => {
    const fbtn = document.getElementById('forecastBtn'); const fold = fbtn.innerHTML; fbtn.disabled = true; fbtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Forecasting...';
    const body = {
      start: document.getElementById('start').value || null,
      end: document.getElementById('end').value || null,
      horizon: (document.getElementById('horizon').value || '').trim() || 60
    };
    const res = await fetch('/api/forecast', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)});
    const f = await res.json();
    if (f.error) { alert(JSON.stringify(f)); fbtn.disabled = false; fbtn.innerHTML = fold; return; }
    const traceFc = { x: f.x_future, y: f.y_forecast, type: 'scatter', mode: 'lines', name: 'Forecast', line: { dash: 'dash', color: '#d9534f' } };
    const gd = document.getElementById('predChart');
    if (!gd.data || !gd.data.length) {
      // create a fresh chart with only forecast if none exists yet
      const layout = { title: 'Forecast (Energy)', xaxis: { title: 'Timestamp' }, yaxis: { title: 'Energy (kWh)' }, margin: { t: 60 } };
      Plotly.newPlot(gd, [traceFc], layout);
    } else {
      Plotly.addTraces(gd, [traceFc]);
    }
    // Show dt and total span info
    const hz = parseInt((document.getElementById('horizon').value || '60').trim(), 10) || 60;
    const dtSec = Number(f.dt_seconds || 0);
    const totalSec = Math.max(0, hz * (isFinite(dtSec) && dtSec > 0 ? dtSec : 60));
    const mins = (totalSec / 60).toFixed(1);
    document.getElementById('forecastInfo').textContent = `Forecast dt ≈ ${dtSec.toFixed ? dtSec.toFixed(0) : dtSec}s, horizon ${hz} points ⇒ ~${mins} minutes`;
    fbtn.disabled = false; fbtn.innerHTML = fold;
  });

  document.getElementById('clearForecastBtn').addEventListener('click', async () => {
    const gd = document.getElementById('predChart');
    const data = gd.data || [];
    const keep = [];
    for (let i = 0; i < data.length; i++) {
      if (!(data[i].name === 'Forecast')) keep.push(i);
    }
    const toDelete = [];
    for (let i = 0; i < data.length; i++) {
      if (data[i].name === 'Forecast') toDelete.push(i);
    }
    if (toDelete.length) Plotly.deleteTraces('predChart', toDelete);
    document.getElementById('forecastInfo').textContent = '';
  });

  // Export: CSV and PNG
  function attachExportHandlers(lastData){
    const dlCsvBtn = document.getElementById('dlCsvBtn');
    const dlPngBtn = document.getElementById('dlPngBtn');
    if (!dlCsvBtn || !dlPngBtn) return;
    dlCsvBtn.onclick = () => {
      const rows = ['Timestamp,Actual,Predicted'];
      const x = lastData.x || [];
      const yt = lastData.y_true || [];
      const yp = lastData.y_pred || [];
      for (let i = 0; i < x.length; i++) {
        rows.push(`${x[i]},${yt[i] ?? ''},${yp[i] ?? ''}`);
      }
      const blob = new Blob([rows.join('\n')], {type: 'text/csv'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'predictions.csv'; a.click();
      URL.revokeObjectURL(url);
    };
    dlPngBtn.onclick = async () => {
      const url = await Plotly.toImage('predChart', { format: 'png', width: 1200, height: 600 });
      const a = document.createElement('a');
      a.href = url; a.download = 'chart.png'; a.click();
    };
  }
</script>
{% endblock %}
