{% extends 'base.html' %}
{% block content %}
<h3>Preview (first 100 rows)</h3>
<p>Total rows: {{ n }}</p>
<div class="table-responsive">
  <table class="table table-sm table-striped">
    <thead>
      <tr>
        {% for c in columns %}<th>{{ c }}</th>{% endfor %}
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr>
        {% for v in row %}<td>{{ v }}</td>{% endfor %}
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
<div class="mt-3">
  <a href="{{ url_for('visualize') }}" class="btn btn-success">Continue to Visualization</a>
</div>
{% endblock %}
